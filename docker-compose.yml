# 开发环境基础设施骨架：PostgreSQL / Redis / MinIO
# 起步用，按需调整账号密码与端口。生产环境请改用密钥管理而非明文。

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: packing
      POSTGRES_PASSWORD: packing
      POSTGRES_DB: packing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 控制台
    volumes:
      - miniodata:/data

  # 求解器较重时启用独立 worker（Celery）；初期可注释，求解跑进程池即可。
  # worker:
  #   build: ./server
  #   command: celery -A app.solver.celery_app worker --concurrency=2
  #   depends_on: [redis, postgres]

volumes:
  pgdata:
  miniodata:
